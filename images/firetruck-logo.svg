<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" role="img" aria-label="Animated fire truck mascot logo">
  <defs>
    <linearGradient id="bodyRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6a5f"/>
      <stop offset="55%" stop-color="#d93a32"/>
      <stop offset="100%" stop-color="#a91f1b"/>
    </linearGradient>
    <linearGradient id="darkRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c7352e"/>
      <stop offset="100%" stop-color="#821611"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#d9dde5"/>
      <stop offset="70%" stop-color="#9ea7b5"/>
      <stop offset="100%" stop-color="#f8fbff"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#bff6ff"/>
      <stop offset="100%" stop-color="#4ea2cf"/>
    </linearGradient>
    <linearGradient id="tyre" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#31343a"/>
      <stop offset="100%" stop-color="#111317"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#09152f" flood-opacity="0.22"/>
    </filter>
    <filter id="glowRed" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#ff4b42" flood-opacity="0.35"/>
    </filter>
    <style>
      .truck-float { animation: floatTruck 3.6s ease-in-out infinite; transform-origin: 50% 50%; }
      .wave-arm { animation: waveArm 1.7s ease-in-out infinite; transform-origin: 708px 260px; }
      .light-left { animation: lightPulseRed 1.15s ease-in-out infinite; }
      .light-right { animation: lightPulseAmber 1.15s ease-in-out infinite alternate; }
      .eye-pupil { animation: blinkEyes 4.4s ease-in-out infinite; transform-origin: center; }
      @keyframes floatTruck {
        0%,100% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
      }
      @keyframes waveArm {
        0%,100% { transform: rotate(0deg); }
        20% { transform: rotate(10deg); }
        40% { transform: rotate(-2deg); }
        60% { transform: rotate(12deg); }
        80% { transform: rotate(1deg); }
      }
      @keyframes lightPulseRed {
        0%,100% { opacity: 0.85; filter: drop-shadow(0 0 4px rgba(255,79,67,.35)); }
        50% { opacity: 1; filter: drop-shadow(0 0 15px rgba(255,79,67,.75)); }
      }
      @keyframes lightPulseAmber {
        0%,100% { opacity: 0.85; filter: drop-shadow(0 0 4px rgba(255,196,84,.35)); }
        50% { opacity: 1; filter: drop-shadow(0 0 15px rgba(255,196,84,.75)); }
      }
      @keyframes blinkEyes {
        0%, 44%, 48%, 100% { transform: scaleY(1); }
        46% { transform: scaleY(0.08); }
      }
    </style>
  </defs>  <g class="truck-float" filter="url(#softShadow)">
